services:
  db:
    image: pgvector/pgvector:pg15
    container_name: medipal-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medipal_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-medipal_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
